name: Daily ETF Report

on:
  schedule:
    - cron: '0 22 * * *'   # 한국시간 매일 오전 7시 실행

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
     
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
      
    - name: Run ETF Report
      run: python daily_etf_report.py
